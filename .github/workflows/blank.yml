name: Build RDX SPACE APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x ./gradlew || echo "gradlew not found, checking..."

      - name: Build Debug APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --stacktrace
          else
            echo "❌ gradlew file not found in root!"
            ls -la
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PUBG-Mod-APK
          path: app/build/outputs/apk/debug/*.apk
